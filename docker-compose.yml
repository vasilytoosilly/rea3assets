services:
  postgres:
    image: postgres:16-alpine
    container_name: rea3assets-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rea3_assets
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rea3_assets"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
